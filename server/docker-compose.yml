services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iep-fastapi
    ports:
      - "8000:8000"
    environment:
      # Intentionally keep API on local SQLite for now.
      - SQLALCHEMY_DATABASE_URL=sqlite:///./iep.db
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: iep-postgres
    environment:
      - POSTGRES_DB=iep
      - POSTGRES_USER=iep
      - POSTGRES_PASSWORD=iep
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iep -d iep"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
